included:
  - Kodomon

excluded:
  - build
  - DerivedData
  - .build

line_length:
  warning: 140
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

disabled_rules:
  - trailing_whitespace
  - opening_brace

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicitly_unwrapped_optional
